<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G1 Control Center | Premium Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation"></div>
    
    <header>
        <div class="logo">G1 <span>Humanoid</span></div>
        <div class="status-indicator">
            <span class="dot" id="ros-status"></span>
            <span id="status-text">Isaac Sim: Conectando...</span>
        </div>
    </header>

    <main class="dashboard">
        <!-- Panel de Telemetría (Placeholders) -->
        <section class="telemetry-panel card">
            <h2><i class="icon-telemetry"></i> Telemetría Real-Time</h2>
            <div class="metrics-grid">
                <div class="metric">
                    <label>Posición X</label>
                    <div class="value" id="pos-x">--</div>
                </div>
                <div class="metric">
                    <label>Posición Y</label>
                    <div class="value" id="pos-y">--</div>
                </div>
                <div class="metric">
                    <label>Orientación</label>
                    <div class="value" id="pos-yaw">--</div>
                </div>
                <div class="metric">
                    <label>Vel. Linear</label>
                    <div class="value" id="vel-lin">--</div>
                </div>
            </div>
            <div class="camera-placeholder">
                <div class="placeholder-text">Sensor Visual (Streaming No Disponible)</div>
            </div>
        </section>

        <!-- Panel de Control -->
        <section class="control-panel card">
            <h2><i class="icon-controller"></i> Control de Movimiento</h2>
            <div class="control-layout">
                <div class="dpad">
                    <button class="btn-step" data-dir="forward" id="btn-up">▲</button>
                    <div class="side-btns">
                        <button class="btn-step" data-dir="left" id="btn-left">◀</button>
                        <button class="btn-step stop" data-dir="stop" id="btn-stop">■</button>
                        <button class="btn-step" data-dir="right" id="btn-right">▶</button>
                    </div>
                    <button class="btn-step" data-dir="backward" id="btn-down">▼</button>
                </div>
                <div class="instructions">
                    <p>Mover: <strong>WASD</strong> | Diagonales soportadas</p>
                    <div id="debug-twist" style="color: var(--accent-color); font-family: monospace; margin: 10px 0; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 5px; font-size: 0.8rem;">Twist -> X: 0 | Y: 0 | Z: 0</div>
                    <p>Pasos laterales (Strafing): <strong>Q / E</strong></p>
                    <p>Parar: <strong>Espacio</strong></p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 G1 Challenge - Monitoring System</p>
    </footer>

    <script>
        // Estado del teclado
        const keys = {
            w: false, s: false, a: false, d: false, q: false, e: false
        };

        let lastSent = { x: 0, y: 0, z: 0 };

        async function updateMovement() {
            let x = 0, y = 0, z = 0;
            const speed = 0.8;

            if (keys.w) x += speed;
            if (keys.s) x -= speed;
            
            // Siguiendo instrucciones: A/D ahora para PASOS LATERALES (linear.y)
            // Angular se queda en 0.
            if (keys.a) y += speed; // Paso lateral Izal
            if (keys.d) y -= speed; // Paso lateral Der

            // Teclas Q/E por si acaso, pero mapeadas a lo mismo o desactivadas
            if (keys.q) y += speed;
            if (keys.e) y -= speed;

            // Enviar si hay cambios o si se mantiene presionado
            if (x !== lastSent.x || y !== lastSent.y || z !== lastSent.z || (x !== 0 || y !== 0 || z !== 0)) {
                try {
                    await fetch(`/api/move?linear_x=${x}&linear_y=${y}&angular_z=${z}`, {
                        method: 'POST'
                    });
                    lastSent = { x, y, z };
                    updateDebug(x, y, z);
                } catch (error) {
                    console.error('Error enviando movimiento:', error);
                }
            }
        }

        function updateDebug(x, y, z) {
            const debugEl = document.getElementById('debug-twist');
            if (debugEl) {
                debugEl.innerText = `Twist -> X: ${x.toFixed(1)} | Y: ${y.toFixed(1)} | Z (Ang): ${z.toFixed(1)}`;
            }
        }

        async function updateTelemetry() {
            try {
                const response = await fetch('/api/telemetry');
                const data = await response.json();
                
                const statusDot = document.getElementById('ros-status');
                const statusText = document.getElementById('status-text');

                if (data.status === "Connected") {
                    statusDot.style.backgroundColor = "#00ff88";
                    statusDot.style.boxShadow = "0 0 8px #00ff88";
                    statusText.innerText = "Isaac Sim: Online";
                } else {
                    statusDot.style.backgroundColor = "#ff3333";
                    statusText.innerText = `Isaac Sim: ${data.status}`;
                }

                if (data.x !== undefined) {
                    document.getElementById('pos-x').innerText = data.x;
                    document.getElementById('pos-y').innerText = data.y;
                    document.getElementById('pos-yaw').innerText = `${Math.round(data.theta * 57.2958)}°`;
                    document.getElementById('vel-lin').innerText = lastSent.x != 0 || lastSent.z != 0 ? "Moving" : "Idle";
                }
            } catch (error) {
                console.error('Error fetching telemetry:', error);
            }
        }

        // Manejo de teclado
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = true;
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = false;
            if (key === ' ') {
                Object.keys(keys).forEach(k => keys[k] = false);
            }
        });

        // Eventos de botones (D-PAD)
        document.querySelectorAll('.btn-step').forEach(btn => {
            btn.addEventListener('mousedown', () => {
                const dir = btn.dataset.dir;
                if(dir === "forward") keys.w = true;
                if(dir === "backward") keys.s = true;
                if(dir === "left") keys.a = true;
                if(dir === "right") keys.d = true;
                if(dir === "stop") Object.keys(keys).forEach(k => keys[k] = false);
            });
            btn.addEventListener('mouseup', () => {
                const dir = btn.dataset.dir;
                if(dir === "forward") keys.w = false;
                if(dir === "backward") keys.s = false;
                if(dir === "left") keys.a = false;
                if(dir === "right") keys.d = false;
            });
        });

        // Loops
        setInterval(updateMovement, 100); 
        setInterval(updateTelemetry, 1000);
    </script>
</body>
</html>
