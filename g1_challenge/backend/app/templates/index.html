<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G1 Control Center | Premium Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap"
        rel="stylesheet">
    <!-- ROSlibJS para Streaming Directo -->
    <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
</head>

<body>
    <div class="background-animation"></div>

    <header>
        <div class="logo">G1 <span>Humanoid</span></div>
        <div class="status-indicator">
            <span class="dot" id="ros-status"></span>
            <span id="status-text">Isaac Sim: Conectando...</span>
        </div>
    </header>

    <main class="dashboard">
        <!-- Panel de Telemetría -->
        <section class="telemetry-panel card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="margin: 0;"><i class="icon-telemetry"></i> Telemetría Real-Time</h2>
                <button id="btn-toggle-telemetry" class="btn-step"
                    style="font-size: 0.9rem; padding: 5px 15px; width: auto; background: var(--accent-color);">
                    Pausar Telemetría
                </button>
            </div>
            <div class="metrics-grid">
                <div class="metric">
                    <label>Posición X</label>
                    <div class="value" id="pos-x">0.0</div>
                </div>
                <div class="metric">
                    <label>Posición Y</label>
                    <div class="value" id="pos-y">0.0</div>
                </div>
                <div class="metric">
                    <label>Orientación</label>
                    <div class="value" id="pos-yaw">0°</div>
                </div>
                <div class="metric">
                    <label>Status</label>
                    <div class="value" id="vel-lin" style="font-size: 1.2rem; color: var(--accent-color);">IDLE</div>
                </div>
            </div>
            <div class="camera-container">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h3 style="margin: 0;">Feed de Cámara</h3>
                    <button id="btn-toggle-camera" class="btn-step"
                        style="font-size: 0.9rem; padding: 5px 15px; width: auto; background: var(--secondary-color);">
                        Conectar Cámara
                    </button>
                </div>
                <img id="camera-stream" src="" alt="Esperando Stream..." onerror="this.style.display='none'">
                <div id="camera-placeholder" class="camera-placeholder">
                    <div class="placeholder-text">Conectando a RealSense...</div>
                </div>
            </div>
        </section>

        <!-- Panel de Control -->
        <section class="control-panel card">
            <h2><i class="icon-controller"></i> Control de Movimiento</h2>
            <div class="control-layout">
                <div class="dpad">
                    <button class="btn-step" data-dir="forward" id="btn-up">▲</button>
                    <div class="side-btns">
                        <button class="btn-step" data-dir="left" id="btn-left">◀</button>
                        <button class="btn-step stop" data-dir="stop" id="btn-stop">■</button>
                        <button class="btn-step" data-dir="right" id="btn-right">▶</button>
                    </div>
                    <button class="btn-step" data-dir="backward" id="btn-down">▼</button>
                </div>
                <div class="instructions">
                    <p>Mover: <strong>WASD</strong> | Diagonales soportadas</p>
                    <div id="debug-twist"
                        style="color: var(--accent-color); font-family: monospace; margin: 10px 0; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 5px; font-size: 0.8rem;">
                        Twist -> X: 0 | Y: 0 | Z: 0</div>
                    <p>Pasos laterales (Strafing): <strong>Q / E</strong></p>
                    <p>Parar: <strong>Espacio</strong></p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 G1 Challenge - Monitoring System</p>
    </footer>

    <script>
        // Configuración ROS Directa (Browser -> Isaac Sim)
        const ros = new ROSLIB.Ros({
            url: 'ws://192.168.3.122:9090'
        });

        ros.on('connection', function () {
            console.log('✔ Conexión establecida con ROS Bridge');
            document.getElementById('ros-status').style.backgroundColor = "#00ff88";
            document.getElementById('ros-status').style.boxShadow = "0 0 10px #00ff88";
            document.getElementById('status-text').innerText = "Isaac Sim: Online";
        });

        ros.on('error', function (error) {
            console.log('✖ Error de conexión:', error);
            document.getElementById('status-text').innerText = "Isaac Sim: Error de conexión";
        });

        ros.on('close', function () {
            console.log('✖ Conexión cerrada');
            document.getElementById('ros-status').style.backgroundColor = "#ff3333";
            document.getElementById('status-text').innerText = "Isaac Sim: Offline";
            document.getElementById('camera-placeholder').style.display = 'flex';
        });

        // Tópico de la cámara RGB Head
        const imageTopic = new ROSLIB.Topic({
            ros: ros,
            name: '/g1_robot/camera_head/rgb/image_raw',
            messageType: 'sensor_msgs/msg/Image'
        });

        function handleImage(message) {
            const placeholder = document.getElementById('camera-placeholder');
            const img = document.getElementById('camera-stream');
            let canvas = document.getElementById('camera-canvas');

            if (message.data) {
                if (message.encoding === "rgb8" || message.encoding === "bgr8" || message.encoding === "rgba8" || message.encoding === "bgra8") {

                    if (!canvas) {
                        canvas = document.createElement('canvas');
                        canvas.id = 'camera-canvas';
                        canvas.style.width = '100%';
                        canvas.style.borderRadius = 'var(--radius)';
                        img.parentNode.insertBefore(canvas, img.nextSibling);
                    }
                    if (canvas.width !== message.width) {
                        canvas.width = message.width;
                        canvas.height = message.height;
                    }

                    img.style.display = 'none';
                    canvas.style.display = 'block';
                    placeholder.style.display = 'none';

                    const ctx = canvas.getContext('2d');
                    const imgData = ctx.createImageData(message.width, message.height);

                    // Decode base64 
                    const rawString = atob(message.data);

                    if (message.encoding === "rgb8") {
                        for (let i = 0, j = 0; i < rawString.length; i += 3, j += 4) {
                            imgData.data[j] = rawString.charCodeAt(i);
                            imgData.data[j + 1] = rawString.charCodeAt(i + 1);
                            imgData.data[j + 2] = rawString.charCodeAt(i + 2);
                            imgData.data[j + 3] = 255;
                        }
                    } else if (message.encoding === "bgr8") {
                        for (let i = 0, j = 0; i < rawString.length; i += 3, j += 4) {
                            imgData.data[j] = rawString.charCodeAt(i + 2);
                            imgData.data[j + 1] = rawString.charCodeAt(i + 1);
                            imgData.data[j + 2] = rawString.charCodeAt(i);
                            imgData.data[j + 3] = 255;
                        }
                    } else if (message.encoding === "rgba8") {
                        for (let i = 0, j = 0; i < rawString.length; i += 4, j += 4) {
                            imgData.data[j] = rawString.charCodeAt(i);
                            imgData.data[j + 1] = rawString.charCodeAt(i + 1);
                            imgData.data[j + 2] = rawString.charCodeAt(i + 2);
                            imgData.data[j + 3] = rawString.charCodeAt(i + 3);
                        }
                    } else if (message.encoding === "bgra8") {
                        for (let i = 0, j = 0; i < rawString.length; i += 4, j += 4) {
                            imgData.data[j] = rawString.charCodeAt(i + 2);
                            imgData.data[j + 1] = rawString.charCodeAt(i + 1);
                            imgData.data[j + 2] = rawString.charCodeAt(i);
                            imgData.data[j + 3] = rawString.charCodeAt(i + 3);
                        }
                    }
                    ctx.putImageData(imgData, 0, 0);

                } else {
                    // Si llega versión base64 jpeg compacta u otro formato exótico, imprimimos error visual en placeholder
                    img.style.display = 'none';
                    if (canvas) canvas.style.display = 'none';
                    placeholder.style.display = 'flex';
                    placeholder.querySelector('.placeholder-text').innerText = `Formato no soportado: ${message.encoding}`;
                }
            } else {
                console.warn("Mensaje sin datos de imagen");
            }
        }

        let cameraActive = false;
        const btnToggleCamera = document.getElementById('btn-toggle-camera');

        btnToggleCamera.addEventListener('click', () => {
            if (cameraActive) {
                // Desconectar (Desuscribirse)
                imageTopic.unsubscribe();
                cameraActive = false;
                btnToggleCamera.innerText = "Conectar Cámara";
                btnToggleCamera.style.background = "var(--secondary-color)";

                // Resetear vista
                const img = document.getElementById('camera-stream');
                let canvas = document.getElementById('camera-canvas');
                const placeholder = document.getElementById('camera-placeholder');

                img.style.display = 'none';
                if (canvas) canvas.style.display = 'none';
                placeholder.style.display = 'flex';
                placeholder.querySelector('.placeholder-text').innerText = "Cámara Pausada (Click para Conectar)";

                console.log("Desuscrito de:", imageTopic.name);
            } else {
                // Conectar (Suscribirse)
                const placeholder = document.getElementById('camera-placeholder');
                placeholder.querySelector('.placeholder-text').innerText = "Conectando a RealSense...";

                imageTopic.subscribe(handleImage);
                cameraActive = true;
                btnToggleCamera.innerText = "Desconectar Cámara";
                btnToggleCamera.style.background = "var(--accent-color)";

                console.log("Suscrito a:", imageTopic.name);
            }
        });

        // Estado del teclado (WASD)
        const keys = {
            w: false, s: false, a: false, d: false
        };

        let lastSent = { x: 0, y: 0, z: 0 };

        async function updateMovement() {
            let x = 0, y = 0, z = 0;
            const speed = 0.8;

            if (keys.w) x += speed;
            if (keys.s) x -= speed;

            // Siguiendo instrucciones: A/D ahora para PASOS LATERALES (linear.y)
            // Angular se queda en 0.
            if (keys.a) y += speed; // Paso lateral Izal
            if (keys.d) y -= speed; // Paso lateral Der

            // Teclas Q/E por si acaso, pero mapeadas a lo mismo o desactivadas
            if (keys.q) y += speed;
            if (keys.e) y -= speed;

            // Enviar si hay cambios o si se mantiene presionado
            if (x !== lastSent.x || y !== lastSent.y || z !== lastSent.z || (x !== 0 || y !== 0 || z !== 0)) {
                try {
                    await fetch(`/api/move?linear_x=${x}&linear_y=${y}&angular_z=${z}`, {
                        method: 'POST'
                    });
                    lastSent = { x, y, z };
                    updateDebug(x, y, z);
                } catch (error) {
                    console.error('Error enviando movimiento:', error);
                }
            }
        }

        function updateDebug(x, y, z) {
            const debugEl = document.getElementById('debug-twist');
            if (debugEl) {
                debugEl.innerText = `Twist -> X: ${x.toFixed(1)} | Y: ${y.toFixed(1)} | Z (Ang): ${z.toFixed(1)}`;
            }
        }

        async function updateTelemetry() {
            try {
                const response = await fetch('/api/telemetry');
                const data = await response.json();

                const statusDot = document.getElementById('ros-status');
                const statusText = document.getElementById('status-text');

                if (data.status === "Connected") {
                    statusDot.style.backgroundColor = "#00ff88";
                    statusDot.style.boxShadow = "0 0 8px #00ff88";
                    statusText.innerText = "Isaac Sim: Online";
                } else {
                    statusDot.style.backgroundColor = "#ff3333";
                    statusText.innerText = `Isaac Sim: ${data.status}`;
                }

                if (data.x !== undefined) {
                    document.getElementById('pos-x').innerText = data.x;
                    document.getElementById('pos-y').innerText = data.y;
                    document.getElementById('pos-yaw').innerText = `${Math.round(data.theta * 57.2958)}°`;
                    document.getElementById('vel-lin').innerText = lastSent.x != 0 || lastSent.z != 0 ? "Moving" : "Idle";
                }
            } catch (error) {
                console.error('Error fetching telemetry:', error);
            }
        }

        // Manejo de teclado
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = true;
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = false;
            if (key === ' ') {
                Object.keys(keys).forEach(k => keys[k] = false);
            }
        });

        // Eventos de botones (D-PAD)
        document.querySelectorAll('.btn-step').forEach(btn => {
            btn.addEventListener('mousedown', () => {
                const dir = btn.dataset.dir;
                if (dir === "forward") keys.w = true;
                if (dir === "backward") keys.s = true;
                if (dir === "left") keys.a = true;
                if (dir === "right") keys.d = true;
                if (dir === "stop") Object.keys(keys).forEach(k => keys[k] = false);
            });
            btn.addEventListener('mouseup', () => {
                const dir = btn.dataset.dir;
                if (dir === "forward") keys.w = false;
                if (dir === "backward") keys.s = false;
                if (dir === "left") keys.a = false;
                if (dir === "right") keys.d = false;
            });
        });

        // Control de Telemetría
        let telemetryInterval = null;
        let telemetryActive = true;
        const btnToggleTelemetry = document.getElementById('btn-toggle-telemetry');

        function startTelemetry() {
            if (!telemetryInterval) {
                telemetryInterval = setInterval(updateTelemetry, 1000);
            }
        }

        function stopTelemetry() {
            if (telemetryInterval) {
                clearInterval(telemetryInterval);
                telemetryInterval = null;
            }
        }

        btnToggleTelemetry.addEventListener('click', () => {
            telemetryActive = !telemetryActive;
            if (telemetryActive) {
                startTelemetry();
                btnToggleTelemetry.innerText = "Pausar Telemetría";
                btnToggleTelemetry.style.background = "var(--accent-color)";
                // Update dots to show active again
                document.getElementById('ros-status').style.backgroundColor = "#00ff88";
                document.getElementById('status-text').innerText = "Isaac Sim: Online";
            } else {
                stopTelemetry();
                btnToggleTelemetry.innerText = "Reanudar Telemetría";
                btnToggleTelemetry.style.background = "var(--secondary-color)";
                // Update dots to show paused
                document.getElementById('ros-status').style.backgroundColor = "gray";
                document.getElementById('status-text').innerText = "Isaac Sim: Telemetría Pausada";
            }
        });

        // Loops iniciales
        setInterval(updateMovement, 100);
        startTelemetry(); // Iniciar telemetría por defecto
    </script>
</body>

</html>
